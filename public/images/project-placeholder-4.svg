<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a120a"/>
      <stop offset="100%" stop-color="#140f0a"/>
    </linearGradient>
    <pattern id="grid4" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f59e0b" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg4)"/>
  <rect width="800" height="450" fill="url(#grid4)"/>
  <!-- Angular geometric shapes -->
  <polygon points="400,50 550,200 400,350 250,200" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.12"/>
  <polygon points="400,100 510,200 400,300 290,200" fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.1"/>
  <polygon points="400,150 460,200 400,250 340,200" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <!-- Radiating lines -->
  <line x1="400" y1="200" x2="100" y2="50" stroke="#f59e0b" stroke-width="0.4" opacity="0.08"/>
  <line x1="400" y1="200" x2="700" y2="80" stroke="#fbbf24" stroke-width="0.4" opacity="0.06"/>
  <line x1="400" y1="200" x2="750" y2="400" stroke="#f59e0b" stroke-width="0.4" opacity="0.08"/>
  <line x1="400" y1="200" x2="50" y2="380" stroke="#fbbf24" stroke-width="0.4" opacity="0.06"/>
  <!-- Corner accents -->
  <path d="M 0 0 L 80 0 L 80 5 L 5 5 L 5 80 L 0 80 Z" fill="#f59e0b" opacity="0.08"/>
  <path d="M 800 450 L 720 450 L 720 445 L 795 445 L 795 370 L 800 370 Z" fill="#fbbf24" opacity="0.06"/>
  <!-- Nodes -->
  <circle cx="400" cy="200" r="5" fill="#f59e0b" opacity="0.25"/>
  <circle cx="250" cy="200" r="3" fill="#fbbf24" opacity="0.2"/>
  <circle cx="550" cy="200" r="3" fill="#f59e0b" opacity="0.2"/>
  <!-- Glow -->
  <circle cx="400" cy="200" r="160" fill="#f59e0b" opacity="0.03"/>
</svg>