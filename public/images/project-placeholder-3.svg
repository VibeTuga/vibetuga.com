<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#080d14"/>
    </linearGradient>
    <pattern id="dots3" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#38bdf8" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <rect width="800" height="450" fill="url(#dots3)"/>
  <!-- Concentric arcs -->
  <circle cx="600" cy="350" r="200" fill="none" stroke="#38bdf8" stroke-width="0.6" opacity="0.1"/>
  <circle cx="600" cy="350" r="150" fill="none" stroke="#2dd4bf" stroke-width="0.8" opacity="0.08"/>
  <circle cx="600" cy="350" r="100" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>
  <circle cx="600" cy="350" r="50" fill="none" stroke="#2dd4bf" stroke-width="0.6" opacity="0.15"/>
  <!-- Connecting lines -->
  <line x1="100" y1="100" x2="600" y2="350" stroke="#38bdf8" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="400" x2="600" y2="350" stroke="#2dd4bf" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="225" x2="400" y2="200" stroke="#38bdf8" stroke-width="0.4" opacity="0.08"/>
  <!-- Floating rectangles -->
  <rect x="80" y="80" width="120" height="70" rx="2" fill="none" stroke="#38bdf8" stroke-width="0.6" opacity="0.1"/>
  <rect x="250" y="300" width="100" height="60" rx="2" fill="none" stroke="#2dd4bf" stroke-width="0.6" opacity="0.08"/>
  <!-- Data points -->
  <circle cx="100" cy="100" r="4" fill="#38bdf8" opacity="0.25"/>
  <circle cx="200" cy="400" r="3" fill="#2dd4bf" opacity="0.2"/>
  <circle cx="600" cy="350" r="6" fill="#38bdf8" opacity="0.2"/>
  <!-- Glow -->
  <circle cx="600" cy="350" r="180" fill="#38bdf8" opacity="0.025"/>
  <circle cx="150" cy="200" r="120" fill="#2dd4bf" opacity="0.02"/>
</svg>